# 三层学科分类体系
# Layer 1: 门类 (category)
# Layer 2: 一级学科 (discipline)
# Layer 3: 二级学科 + 关键词 (sub_disciplines → keywords)
#
# 核心期刊来源: 北大核心目录2023版 + CSCD 2023-2024

disciplines:
  工学:
    土木工程:
      sub_disciplines:
        结构工程:
          keywords: [钢结构, 混凝土结构, 组合结构, 高层建筑结构, 大跨空间结构, 预应力结构, 装配式结构, 抗震设计, 抗风设计]
        岩土工程:
          keywords: [地基处理, 深基坑, 边坡稳定, 隧道工程, 地下工程, 桩基, 软土, 膨胀土, 冻土, 土动力学]
        桥梁与隧道工程:
          keywords: [桥梁设计, 隧道施工, 盾构, 悬索桥, 斜拉桥, 沉管隧道, 桥梁抗震, 桥梁健康监测, 管片]
        市政工程:
          keywords: [给排水, 污水处理, 海绵城市, 城市防洪, 综合管廊, 道路工程, 垃圾填埋]
        防灾减灾工程:
          keywords: [地震工程, 抗震加固, 隔震, 消能减震, 地质灾害, 滑坡, 泥石流, 地面沉降]
      core_journals:
        - 土木工程学报
        - 建筑结构学报
        - 岩土工程学报
        - 岩石力学与工程学报
        - 工程力学
        - 地震工程与工程振动
        - 建筑材料学报

    机械工程:
      sub_disciplines:
        机械设计与理论:
          keywords: [机械设计, 机构学, 机械动力学, 摩擦学, 可靠性设计, 优化设计, 有限元分析]
        机械制造及其自动化:
          keywords: [数控加工, 精密制造, 增材制造, 3D打印, 特种加工, 高速切削, 智能制造, 数字孪生]
        机械电子工程:
          keywords: [机电一体化, 机器人, 伺服控制, 传感器, 状态监测, 故障诊断, 液压传动, 气动]
        车辆工程:
          keywords: [汽车设计, 电动汽车, 混合动力, 燃料电池, 自动驾驶, 底盘, 动力总成, 碰撞安全]
      core_journals:
        - 机械工程学报
        - 中国机械工程
        - 机械设计
        - 机械科学与技术

    材料科学与工程:
      sub_disciplines:
        金属材料:
          keywords: [合金, 钢铁, 铝合金, 钛合金, 高温合金, 形状记忆合金, 热处理, 相变, 微观组织]
        无机非金属材料:
          keywords: [陶瓷, 玻璃, 水泥, 混凝土, 耐火材料, 碳材料, 石墨烯, 碳纳米管]
        高分子材料:
          keywords: [聚合物, 塑料, 橡胶, 纤维, 复合材料, 生物降解, 高分子合成, 功能高分子]
        复合材料:
          keywords: [纤维增强, 层合板, 夹层结构, 金属基复合材料, 陶瓷基复合材料, 界面, 纳米复合材料]
        材料加工工程:
          keywords: [铸造, 锻造, 焊接, 粉末冶金, 注塑, 挤压, 轧制]
      core_journals:
        - 材料研究学报
        - 材料工程
        - 复合材料学报
        - 无机材料学报
        - 高分子材料科学与工程

    电气工程:
      sub_disciplines:
        电力系统及其自动化:
          keywords: [电力系统, 智能电网, 微电网, 继电保护, 电力市场, 配电自动化, 新能源并网, 储能]
        高电压与绝缘技术:
          keywords: [高电压, 绝缘, 局部放电, 雷电, 过电压, 气体绝缘, 电缆, 变压器]
        电机与电器:
          keywords: [电机设计, 永磁电机, 开关电器, 电弧, 电磁兼容, 电力电子变压器]
        电力电子与电力传动:
          keywords: [逆变器, 整流器, DC-DC, 变频调速, 软开关, 宽禁带半导体, SiC, GaN]
      core_journals:
        - 中国电机工程学报
        - 电工技术学报
        - 电力系统自动化
        - 高电压技术

    计算机科学与技术:
      sub_disciplines:
        人工智能:
          keywords: [深度学习, 神经网络, 强化学习, 自然语言处理, 计算机视觉, 大语言模型, Transformer, 知识图谱]
        计算机体系结构:
          keywords: [处理器, 芯片设计, 存储系统, 高性能计算, 量子计算, 边缘计算, 云计算]
        软件工程:
          keywords: [软件架构, 微服务, DevOps, 软件测试, 程序分析, 形式化验证, 开源]
        网络与信息安全:
          keywords: [网络安全, 密码学, 入侵检测, 区块链, 隐私保护, 联邦学习]
        数据科学与数据库:
          keywords: [数据挖掘, 大数据, 数据库, 分布式系统, NoSQL, 图计算]
      core_journals:
        - 计算机学报
        - 软件学报
        - 计算机研究与发展
        - 中国科学:信息科学

    化学工程与技术:
      sub_disciplines:
        化学反应工程:
          keywords: [催化, 反应器, 动力学, 多相流, 微反应器]
        分离工程:
          keywords: [精馏, 膜分离, 吸附, 萃取, 结晶, 色谱]
        化工过程强化:
          keywords: [过程强化, 微化工, 超重力, 微波, 超声]
        能源化工:
          keywords: [煤化工, 石油化工, 天然气化工, 生物质转化, 氢能, 碳捕集, CCUS]
      core_journals:
        - 化工学报
        - 化工进展
        - 化学工程

  理学:
    物理学:
      sub_disciplines:
        凝聚态物理:
          keywords: [超导, 拓扑绝缘体, 量子材料, 磁性材料, 低维材料, 强关联]
        原子分子与光物理:
          keywords: [超冷原子, 量子光学, 激光, 光谱, 量子信息, 量子纠缠]
        核物理:
          keywords: [原子核结构, 核反应, 放射性, 中子, 重离子, 核天体物理]
        引力与天体物理:
          keywords: [引力波, 黑洞, 宇宙学, 暗物质, 暗能量, 相对论]
      core_journals:
        - 物理学报
        - 中国科学:物理学 力学 天文学
        - 物理评论快报

    化学:
      sub_disciplines:
        无机化学:
          keywords: [配位化学, 金属有机框架, MOF, 团簇, 稀土, 无机合成, 晶体结构]
        有机化学:
          keywords: [有机合成, 不对称催化, 全合成, 杂环, 绿色化学, 点击化学]
        物理化学:
          keywords: [催化机理, 表面化学, 电化学, 光化学, 计算化学, DFT, 分子动力学]
        分析化学:
          keywords: [色谱, 质谱, 光谱分析, 电化学传感, 荧光探针, 生物传感]
        高分子化学:
          keywords: [聚合反应, 高分子合成, 可控聚合, 自组装, 响应性高分子]
      core_journals:
        - 化学学报
        - 高等学校化学学报
        - 中国科学:化学
        - 分析化学

    数学:
      sub_disciplines:
        基础数学: {keywords: [代数, 几何, 拓扑, 数论, 泛函分析, 群论, 表示论]}
        应用数学: {keywords: [微分方程, 数值分析, 优化, 动力系统, 数学物理, 反问题]}
        概率论与数理统计: {keywords: [随机过程, 时间序列, 贝叶斯, 高维统计, 极限理论]}
        计算数学: {keywords: [有限元, 差分, 谱方法, 并行计算, 自适应网格, PINN]}
      core_journals:
        - 数学学报
        - 计算数学
        - 应用数学学报

  交叉学科:
    环境科学与工程:
      sub_disciplines:
        水环境: {keywords: [水处理, 废水, 富营养化, 微塑料, 黑臭水体, 膜生物反应器]}
        大气环境: {keywords: [PM2.5, 臭氧, VOCs, 碳排放, 碳中和, 烟气脱硫, 大气化学]}
        固废与土壤: {keywords: [固废处理, 垃圾分类, 土壤修复, 重金属, 焚烧, 填埋, 堆肥]}
      core_journals:
        - 环境科学
        - 环境科学学报
        - 中国环境科学

    生物医学工程:
      sub_disciplines:
        生物材料: {keywords: [生物相容性, 水凝胶, 组织工程, 药物递送, 可降解材料]}
        医学影像: {keywords: [MRI, CT, 超声, PET, 图像分割, 影像组学, AI辅助诊断]}
      core_journals:
        - 生物医学工程学杂志
        - 中国生物医学工程学报

